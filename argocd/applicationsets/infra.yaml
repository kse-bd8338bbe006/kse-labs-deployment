apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/kse-bd8338bbe006/kse-labs-deployment.git
        revision: main
        directories:
          - path: infra/*
  template:
    metadata:
      name: 'infra-{{path.basename}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
    spec:
      project: infra
      source:
        repoURL: https://github.com/kse-bd8338bbe006/kse-labs-deployment.git
        targetRevision: main
        path: '{{path}}'
        directory:
          # Recurse through subdirectories so apps can organize their
          # YAMLs into per-topic folders (e.g. gatekeeper-policies
          # groups related files into read-only-root-fs/, etc.).
          recurse: true
          # Helm-charted apps (Chart.yaml present) still get Helm-rendered
          # by ArgoCD, but as of v2.13 the directory walker also scans
          # the same path and chokes on:
          #   - raw `*.json` files used by .Files.Get (Grafana dashboards)
          #   - `templates/*.yaml` containing `{{ ... }}` Helm syntax
          # Exclude both so the directory walker stays happy on plain
          # YAML apps like infra/gatekeeper-policies/.
          exclude: "{*.json,**/*.json,templates/*,templates/**,**/templates/*,**/templates/**}"
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
