apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/kse-bd8338bbe006/kse-labs-deployment.git
        revision: main
        directories:
          - path: applications/*
          # image-policy-provider-config lives under applications/ so
          # students see and own it on the user-application side, but
          # it deploys into the image-policy-provider namespace, not
          # `applications`. Managed as a stand-alone Application with
          # selfHeal: false (see argocd/applications/).
          - path: applications/image-policy-provider-config
            exclude: true
  template:
    metadata:
      name: 'svc-{{path.basename}}'
    spec:
      project: applications
      source:
        repoURL: https://github.com/kse-bd8338bbe006/kse-labs-deployment.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: applications
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
