# Deploys applications/image-policy-provider-config/ into the
# image-policy-provider namespace, NOT the applications namespace.
#
# Stand-alone here because:
#   * the `applications` ApplicationSet template hardcodes
#     destination.namespace: applications
#   * we want this resource to land in the provider's own namespace
#     so the Deployment (in infra/) can envFrom it directly
#   * we want selfHeal: OFF so students can `kubectl edit configmap`
#     during the lab without ArgoCD reverting their changes one
#     reconcile loop later. ArgoCD will still sync on git changes.
#
# Uses the `infra` project because it permits all namespaces; the
# `applications` project's destination whitelist is only the
# `applications` namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: svc-image-policy-provider-config
  namespace: argocd
spec:
  project: infra
  source:
    repoURL: https://github.com/kse-bd8338bbe006/kse-labs-deployment.git
    targetRevision: main
    path: applications/image-policy-provider-config
  destination:
    server: https://kubernetes.default.svc
    namespace: image-policy-provider
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
