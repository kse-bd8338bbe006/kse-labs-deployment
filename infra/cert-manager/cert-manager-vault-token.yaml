# Bootstraps the cert-manager Vault credential.
#
# A small Kubernetes Job runs once and:
#   1. reads the root token from the existing Secret `vault/vault-token`
#   2. uses it to mint a renewable child token bound to the `pki-issuer`
#      policy (see infra/vault-pki/)
#   3. writes the child token into a Secret `vault-token` in the
#      `cert-manager` namespace, in the shape that cert-manager's
#      Vault Issuer expects (`tokenSecretRef`).
#
# Sync-wave 5 (after cert-manager Deployments are up, before the
# ClusterIssuer in clusterissuer-vault.yaml at wave 10).
#
# Idempotent: the Job exits early if the destination Secret already
# exists (it does not rotate the token automatically -- delete the
# Secret to force re-creation).

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-token-bootstrap
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "1"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-token-bootstrap
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-token-bootstrap
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: vault-token-bootstrap
    namespace: cert-manager
roleRef:
  kind: Role
  name: vault-token-bootstrap
  apiGroup: rbac.authorization.k8s.io

---
# Read-only access to the source Secret in vault namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-read-vault-token
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-token"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-read-vault-token
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: vault-token-bootstrap
    namespace: cert-manager
roleRef:
  kind: Role
  name: cert-manager-read-vault-token
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-token-bootstrap-script
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  bootstrap.sh: |
    #!/bin/sh
    set -eu
    NS=cert-manager
    SECRET=vault-token

    # Skip if the destination Secret already exists.
    if kubectl -n "$NS" get secret "$SECRET" >/dev/null 2>&1; then
      echo "$NS/$SECRET already exists; nothing to do."
      exit 0
    fi

    # Read the root token from the vault namespace.
    ROOT_TOKEN=$(kubectl -n vault get secret vault-token -o jsonpath='{.data.token}' | base64 -d)
    if [ -z "$ROOT_TOKEN" ]; then
      echo "FATAL: could not read vault/vault-token"
      exit 1
    fi

    # Mint a child token bound only to the pki-issuer policy, 1y, renewable.
    CHILD_TOKEN=$(wget -qO- --header="X-Vault-Token: $ROOT_TOKEN" \
                       --post-data='{"policies":["pki-issuer"],"ttl":"8760h","renewable":true}' \
                       http://vault.vault.svc:8200/v1/auth/token/create \
                  | sed -n 's/.*"client_token":"\([^"]*\)".*/\1/p')
    if [ -z "$CHILD_TOKEN" ]; then
      echo "FATAL: could not mint child token"
      exit 1
    fi

    # Write to the destination Secret in cert-manager namespace.
    kubectl -n "$NS" create secret generic "$SECRET" --from-literal=token="$CHILD_TOKEN"
    echo "Created $NS/$SECRET."

---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-token-bootstrap
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 4
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: vault-token-bootstrap
      containers:
        - name: bootstrap
          # alpine/k8s ships kubectl + a real shell on Alpine. We need
          # /bin/sh for the bootstrap script's conditional logic.
          # rancher/kubectl is distroless (no shell); bitnami/kubectl
          # moved to a paid catalog on 2025-08-28.
          image: alpine/k8s:1.32.13
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: vault-token-bootstrap-script
            defaultMode: 0755
