# ClusterIssuer that signs leaf certs by calling Vault's pki_int engine
# (configured by infra/vault-pki/).
#
# Authenticates with a Vault token stored in the Secret
# `cert-manager/vault-token`, which is itself bootstrapped by the
# Job in cert-manager-vault-token.yaml (sync-wave 5). That Job mints
# a child token from the root, scoped to the `pki-issuer` policy.
#
# Sync-wave 10 so the cert-manager controller, CRDs (in
# cert-manager.yaml at wave 0), and the bootstrap Job (wave 5) all
# finish before this ClusterIssuer is applied.
#
# Used by:
#   * infra/image-policy-provider/ -- requests a TLS cert for the
#     OPA Gatekeeper external-data provider service.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-pki-int
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  vault:
    server: http://vault.vault.svc:8200
    path: pki_int/sign/cluster-services
    auth:
      tokenSecretRef:
        name: vault-token
        key: token
