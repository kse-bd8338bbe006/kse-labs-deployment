# OPA Gatekeeper external-data provider for image signature checks.
# Source: https://github.com/kse-bd8338bbe006/image-policy-provider
#
# Cosign trust material (a public key) is mounted as a Secret. For lab
# convenience the key is empty by default -- generate a key pair with
# `cosign generate-key-pair` and replace the data.
#
# Sync-wave 25 so the issued TLS Secret (Certificate at wave 20) exists
# before the Pod starts -- otherwise the volume mount would block
# ContainerCreating until cert-manager catches up.
apiVersion: v1
kind: Secret
metadata:
  name: image-policy-provider-cosign-key
  namespace: image-policy-provider
  annotations:
    argocd.argoproj.io/sync-wave: "20"
type: Opaque
stringData:
  # Replace with the public key used to sign your images.
  # Lab default: empty -> verify_image() will fail with a clear message,
  # which is what we want until students run `cosign generate-key-pair`.
  cosign.pub: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-policy-provider
  namespace: image-policy-provider
  annotations:
    argocd.argoproj.io/sync-wave: "25"
  labels:
    app.kubernetes.io/name: image-policy-provider
    app.kubernetes.io/part-of: gatekeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: image-policy-provider
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-policy-provider
    spec:
      automountServiceAccountToken: false
      # The provider image is a private GHCR package. The Secret is
      # populated by the ExternalSecret in external-secret.yaml from
      # secret/github/ghcr-pull-secret in Vault.
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: provider
          image: ghcr.io/kse-bd8338bbe006/image-policy-provider:main
          imagePullPolicy: Always
          ports:
            - name: https
              containerPort: 8443
          # Runtime configuration -- allowed registries, Cosign trust
          # material, log level, body dumps -- lives in configmap.yaml
          # alongside this manifest. Editing it (or `kubectl edit
          # configmap -n image-policy-provider image-policy-provider-config`)
          # and rolling out the Deployment is the supported way to
          # tweak provider behavior; the Deployment itself rarely
          # changes.
          envFrom:
            - configMapRef:
                name: image-policy-provider-config
                # optional: don't crash if the config is briefly absent
                # during bootstrap; the verifier will simply log
                # "trust mode unset" until the ConfigMap arrives.
                optional: true
          env:
            # cosign caches Rekor public keys under $HOME/.sigstore.
            # readOnlyRootFilesystem=true makes the default home
            # (/home/provider) immutable, so point HOME at a tmpfs
            # mount we own. Same for $TMPDIR for any temp files.
            - name: HOME
              value: /tmp
            - name: TMPDIR
              value: /tmp
          volumeMounts:
            - name: tls
              mountPath: /etc/tls
              readOnly: true
            - name: cosign-key
              mountPath: /etc/cosign
              readOnly: true
            - name: cache
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tls
          secret:
            secretName: image-policy-provider-tls
        - name: cosign-key
          secret:
            secretName: image-policy-provider-cosign-key
        - name: cache
          emptyDir:
            sizeLimit: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: image-policy-provider
  namespace: image-policy-provider
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  selector:
    app.kubernetes.io/name: image-policy-provider
  ports:
    - name: https
      port: 443
      targetPort: https
