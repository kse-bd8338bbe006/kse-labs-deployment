# Gatekeeper Provider CRD: tells the Gatekeeper webhook how to call the
# external-data service from Rego (`external_data({ "provider": "..." })`).
#
# `caBundle` is left empty in source and populated at runtime by the
# bootstrap Job in cabundle-job.yaml -- it copies ca.crt out of the
# cert-manager-issued Secret and patches this resource. Doing it as a
# Job (rather than committing a static base64 blob) keeps the manifest
# in lockstep with whatever CA Vault is currently using -- including
# rotations.
#
# `argocd.argoproj.io/compare-options: IgnoreExtraneous` and the
# `caBundle` ignore-difference rule on the parent Application would
# normally be needed; instead we keep ArgoCD declarative and let the Job
# re-apply the patch any time ArgoCD reverts it (it watches the Provider
# and re-patches when caBundle is empty).
apiVersion: externaldata.gatekeeper.sh/v1beta1
kind: Provider
metadata:
  name: image-policy-provider
  annotations:
    argocd.argoproj.io/sync-wave: "30"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  url: https://image-policy-provider.image-policy-provider.svc:443/validate
  timeout: 10
  caBundle: ""
